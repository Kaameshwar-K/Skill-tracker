<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Student Skill Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#111827',
                        primary: '#6366f1'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-950 text-white flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-card border border-slate-800 rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="w-14 h-14 mx-auto rounded-2xl bg-primary/20 text-primary flex items-center justify-center text-2xl mb-4">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="text-2xl font-bold">Reset your password</h1>
            <p class="text-slate-400 text-sm mt-2">Enter a new password for your Student Skill Tracker account.</p>
        </div>

        <div id="messageBox" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

        <form id="resetPasswordForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">New Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-slate-500"></i>
                    <input type="password" id="newPassword" minlength="8" required placeholder="Minimum 8 characters" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2.5 pl-10 pr-3 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
                </div>
                <p id="passwordHint" class="text-xs mt-1 text-slate-500">At least 8 characters required</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Confirm Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-slate-500"></i>
                    <input type="password" id="confirmPassword" minlength="8" required placeholder="Re-enter new password" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2.5 pl-10 pr-3 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
                </div>
            </div>

            <button id="submitBtn" type="submit" class="w-full bg-primary hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg transition shadow-lg shadow-primary/20">
                Reset Password
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-400">
            Back to <a href="/" class="text-primary hover:text-indigo-400 font-medium">Login</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://skill-tracker-uzka.onrender.com/api';

        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        function showMessage(message, type = 'error') {
            const box = document.getElementById('messageBox');
            box.textContent = message;
            box.className = 'mb-4 rounded-lg px-4 py-3 text-sm ' +
                (type === 'success'
                    ? 'bg-green-500/10 text-green-400 border border-green-500/30'
                    : 'bg-red-500/10 text-red-400 border border-red-500/30');
            box.classList.remove('hidden');
        }

        function updatePasswordHint() {
            const input = document.getElementById('newPassword');
            const hint = document.getElementById('passwordHint');
            const len = input.value.length;
            if (len === 0) {
                hint.textContent = 'At least 8 characters required';
                hint.className = 'text-xs mt-1 text-slate-500';
            } else if (len < 8) {
                hint.textContent = `${8 - len} more character${8 - len > 1 ? 's' : ''} needed`;
                hint.className = 'text-xs mt-1 text-red-400';
            } else {
                hint.textContent = '✓ Password meets the requirement';
                hint.className = 'text-xs mt-1 text-green-400';
            }
        }

        document.getElementById('newPassword').addEventListener('input', updatePasswordHint);

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = getTokenFromUrl();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            if (!token) {
                showMessage('Reset token is missing from the link. Please request a new reset email.');
                return;
            }
            if (newPassword.length < 8) {
                showMessage('Password must be at least 8 characters long.');
                return;
            }
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const response = await fetch(`${API_BASE_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Unable to reset password.');
                }

                showMessage(data.message || 'Password reset successful. Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2200);
            } catch (error) {
                showMessage(error.message || 'Something went wrong.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });

        if (!getTokenFromUrl()) {
            showMessage('Invalid reset link. Please use the link sent to your email.');
        }
    </script>
</body>
</html>
